name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install "mcp[cli]" pytest ruff
      
      - name: Lint
        run: |
          ruff check server.py --no-cache || true
      
      - name: Test
        run: |
          python3 -m pytest tests/ -v